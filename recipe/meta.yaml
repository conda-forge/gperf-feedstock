{% set version = "3.3" %}
{% set sha256 = "fd87e0aba7e43ae054837afd6cd4db03a3f2693deb3619085e6ed9d8d9604ad8" %}

package:
  name: gperf
  version: {{ version }}

source:
  url: http://ftp.gnu.org/pub/gnu/gperf/gperf-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - make
    - sed  # [osx]

test:
  commands:
    - gperf --help
    - gperf --version

about:
  home: https://www.gnu.org/software/gperf/
  dev_url: http://savannah.gnu.org/projects/gperf/
  doc_url: https://www.gnu.org/software/gperf/manual/gperf.html
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: GNU gperf is a perfect hash function generator.

extra:
  recipe-maintainers:
    - mbargull
    - tfors
